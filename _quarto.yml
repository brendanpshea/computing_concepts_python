project:
  type: website
  output-dir: docs
  render:
    - "index.qmd"
    - "about.qmd"
    - "v2/cases/index.qmd"
    - "v2/cases/cs*.qmd"
    - "v2/notebooks/*.ipynb"
    - "archive/index.qmd"
    - "!v2/cases/case_study_template.qmd"
  resources:
    - "archive/2024_intro_cs_notebooks/*.ipynb"
    - "archive/2024_case_studies/*.pdf"

website:
  title: "Computing Concepts with Python"
  description: "Open-access course materials by Brendan Shea, PhD"
  page-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    left:
      - text: "Home"
        href: index.qmd
      - text: "Case Studies"
        href: v2/cases/index.qmd
      - text: "About"
        href: about.qmd
    right:
      - text: "Archive"
        href: archive/index.qmd
      - icon: github
        href: https://github.com/brendanpshea/computing_concepts_python
        aria-label: GitHub
  page-footer:
    left: "© Brendan Shea, PhD · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: [cosmo, v2/cases/_case-styles.scss]
    toc: true
    toc-depth: 2
    fig-cap-location: bottom
    link-external-newwindow: true
    code-overflow: wrap

bibliography: v2/cases/refs.bib
csl: https://www.zotero.org/styles/chicago-author-date

execute:
  freeze: auto
